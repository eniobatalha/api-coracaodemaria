version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cma_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coracaodemaria}
      POSTGRES_USER: ${POSTGRES_USER:-cma_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cma_pass_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cma_user} -d ${POSTGRES_DB:-coracaodemaria}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: cma_postgres_data
